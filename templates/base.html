{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}DailyCom{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script>
        function initMaps() {
            window._mapsReady = true;
            document.dispatchEvent(new Event('maps:ready'));
        }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key="YOUR_API_KEY"&libraries=places&callback=initMaps" async defer></script>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="{% url 'home' %}" class="nav-brand">DailyCom</a>
            <div class="nav-links">
                {% if user.is_authenticated %}
                <span style="font-size: .9rem; font-weight: 500; color: var(--muted); margin-right: 0.5rem;">Welcome, {{ user.username }}</span>
                <a href="{% url 'my_bookings' %}">My Bookings</a>
                <a href="{% url 'create_ride' %}" class="btn-nav" style="border-radius: 8px; text-decoration: none;">Create Ride</a>
                <form action="{% url 'logout' %}" method="post" style="display:inline; margin: 0; padding: 0;">
                    {% csrf_token %}
                    <button type="submit" class="btn-nav" style="background: #ef4444; border: none; font-size: 0.9rem; font-weight: 500; color: #ffffff; padding: .35rem .7rem; border-radius: 8px; cursor: pointer; font-family: inherit;">Logout</button>
                </form>
                {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'signup' %}" class="btn-nav" style="border-radius: 8px; text-decoration: none;">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
