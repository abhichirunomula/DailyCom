{% extends 'base.html' %}
{% block content %}

<!-- MapLibre CSS & JS -->
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<style>
  #map {
    height: 420px;
    border-radius: 12px;
    margin-bottom: 1rem;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .map-instructions {
    background: #ede9fe;
    color: var(--primary);
    border-radius: 8px;
    padding: .75rem 1rem;
    font-size: .875rem;
    margin-bottom: 1rem;
  }
  .map-legend {
    display: flex;
    gap: 1.5rem;
    font-size: .82rem;
    margin-bottom: 1rem;
    color: var(--muted);
    align-items: center;
  }
  .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .dot-green { background: #22c55e; }
  .dot-red { background: #ef4444; }
  .reset-btn {
    margin-left: auto;
    font-size: .8rem;
    padding: .25rem .75rem;
    border-radius: 6px;
    border: 1.5px solid var(--primary);
    color: var(--primary);
    background: transparent;
    cursor: pointer;
  }
  .reset-btn:hover { background: #ede9fe; }
</style>

<div class="form-card" style="max-width: 720px;">
  <h2>Create a Ride 🚗</h2>

  <div class="map-instructions">
    🟢 <strong>1st click</strong> = Source &nbsp;|&nbsp; 🔴 <strong>2nd click</strong> = Destination
  </div>

  <div class="map-legend">
    <span><span class="dot dot-green"></span>Source</span>
    <span><span class="dot dot-red"></span>Destination</span>
    <button class="reset-btn" onclick="resetMap()">🔄 Reset</button>
  </div>

  <div id="map"></div>

  <form method="POST">
    {% csrf_token %}
    <div style="margin-bottom: 1.5rem;">
      {{ form.as_p }}
    </div>
    <button type="submit" class="btn btn-primary">Create Ride</button>
  </form>
</div>

<script>
  // ── Init MapLibre map ──
  const map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/liberty', // Free tiles, no key!
    center: [78.4867, 17.3850], // Hyderabad
    zoom: 11
  });

  // ── Built-in Geolocate button (uses browser Geolocation API) ──
  const geolocate = new maplibregl.GeolocateControl({
    positionOptions: { enableHighAccuracy: true },
    trackUserLocation: false,
    showUserLocation: true
  });
  map.addControl(geolocate);
  map.addControl(new maplibregl.NavigationControl());

  let sourceMarker = null, destMarker = null;
  let clickCount = 0;

  // ── Reverse geocode with Nominatim (free) ──
  async function getPlaceName(lng, lat) {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`
    );
    const data = await res.json();
    return (
      data.address.suburb ||
      data.address.city ||
      data.address.town ||
      data.address.village ||
      data.display_name.split(',')[0]
    );
  }

  // ── When geolocate fires, fill Source field ──
  geolocate.on('geolocate', async (e) => {
    const lng = e.coords.longitude;
    const lat = e.coords.latitude;

    if (sourceMarker) sourceMarker.remove();
    sourceMarker = new maplibregl.Marker({ color: '#22c55e' })
      .setLngLat([lng, lat])
      .setPopup(new maplibregl.Popup().setText('📍 Your Location (Source)'))
      .addTo(map);

    const name = await getPlaceName(lng, lat);
    document.querySelector('input[name="source"]').value = name;
    clickCount = 1; // Next click will set destination
  });

  // ── Map click handler ──
  map.on('click', async (e) => {
    const { lng, lat } = e.lngLat;
    clickCount++;

    if (clickCount === 1) {
      // Source
      if (sourceMarker) sourceMarker.remove();
      sourceMarker = new maplibregl.Marker({ color: '#22c55e' })
        .setLngLat([lng, lat])
        .setPopup(new maplibregl.Popup().setText('🟢 Source'))
        .addTo(map);

      const name = await getPlaceName(lng, lat);
      document.querySelector('input[name="source"]').value = name;

    } else if (clickCount === 2) {
      // Destination
      if (destMarker) destMarker.remove();
      destMarker = new maplibregl.Marker({ color: '#ef4444' })
        .setLngLat([lng, lat])
        .setPopup(new maplibregl.Popup().setText('🔴 Destination'))
        .addTo(map);

      const name = await getPlaceName(lng, lat);
      document.querySelector('input[name="destination"]').value = name;

      // Draw line between source and destination
      if (map.getSource('route')) {
        map.getSource('route').setData({
          type: 'Feature',
          geometry: {
            type: 'LineString',
            coordinates: [sourceMarker.getLngLat().toArray(), [lng, lat]]
          }
        });
      } else {
        map.addSource('route', {
          type: 'geojson',
          data: {
            type: 'Feature',
            geometry: {
              type: 'LineString',
              coordinates: [sourceMarker.getLngLat().toArray(), [lng, lat]]
            }
          }
        });
        map.addLayer({
          id: 'route',
          type: 'line',
          source: 'route',
          paint: {
            'line-color': '#4f46e5',
            'line-width': 3,
            'line-dasharray': [2, 2]
          }
        });
      }
    }
  });

  // ── Reset ──
  function resetMap() {
    clickCount = 0;
    if (sourceMarker) { sourceMarker.remove(); sourceMarker = null; }
    if (destMarker) { destMarker.remove(); destMarker = null; }
    if (map.getLayer('route')) map.removeLayer('route');
    if (map.getSource('route')) map.removeSource('route');
    document.querySelector('input[name="source"]').value = '';
    document.querySelector('input[name="destination"]').value = '';
  }
</script>

{% endblock %}
