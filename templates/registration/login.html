{% extends "base.html" %}

{% block title %}Login - DailyCom{% endblock %}

{% block content %}
<div class="form-card">
    <h2>Login to DailyCom 🚗</h2>
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 1.5rem;">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <div class="form-footer">
        <p>Don't have an account? <a href="{% url 'signup' %}">Sign Up</a></p>
    </div>
</div>
{% endblock %}
